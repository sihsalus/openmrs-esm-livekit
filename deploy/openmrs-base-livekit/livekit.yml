services:
  gateway:
    environment:
      LIVEKIT_HOST: ${LIVEKIT_HOST:-localhost}
      LIVEKIT_TOKEN_HOST: livekit-helper

  livekit:
    image: livekit/livekit-server:latest
    command: ['--config', '/etc/livekit.yaml']
    restart: unless-stopped
    ports:
      - '7880:7880'
      - '7881:7881'
      - '56000-56100:56000-56100/udp'
    volumes:
      - ${OPENMRS_DISTRO_ROOT:?OPENMRS_DISTRO_ROOT is required}/deploy/livekit/livekit-docker.yaml:/etc/livekit.yaml:ro

  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_KEEP_ALIVE: 30m
      OLLAMA_MAX_LOADED_MODELS: '1'
      OLLAMA_NUM_PARALLEL: '1'
    volumes:
      - ollama-data:/root/.ollama

  livekit-helper:
    image: openmrs-base-livekit-helper:latest
    build:
      context: ${OPENMRS_ESM_LIVEKIT_PATH:?OPENMRS_ESM_LIVEKIT_PATH is required}
      dockerfile: ${OPENMRS_DISTRO_ROOT:?OPENMRS_DISTRO_ROOT is required}/deploy/livekit/token-server.Dockerfile
    restart: unless-stopped
    depends_on:
      - livekit
      - backend
      - ollama
    ports:
      - '7890:7890'
    environment:
      TOKEN_SERVER_PORT: '7890'
      TOKEN_SERVER_ENV: ${TOKEN_SERVER_ENV:-development}
      TOKEN_SERVER_ALLOWED_ORIGINS: ${TOKEN_SERVER_ALLOWED_ORIGINS:-}
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      LIVEKIT_ROOM_PREFIX: openmrs-voice-
      LIVEKIT_HTTP_URL: http://livekit:7880
      LIVEKIT_AGENT_HEALTH_URL: http://livekit-agent-cpu:8000/metrics
      LIVEKIT_AGENT_LLM_PROVIDER: ${LIVEKIT_AGENT_LLM_PROVIDER:-ollama}
      LIVEKIT_AGENT_STT_PROVIDER: ${LIVEKIT_AGENT_STT_PROVIDER:-whisper}
      LIVEKIT_AGENT_TTS_PROVIDER: ${LIVEKIT_AGENT_TTS_PROVIDER:-piper}
      OLLAMA_URL: http://ollama:11434
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      OPENMRS_BASE_URL: http://backend:8080/openmrs
      DRAFT_STORE_PATH: /data/drafts.jsonl
      RECORDING_MANIFEST_PATH: /data/recordings.jsonl
      AUDIT_LOG_PATH: /data/audit.jsonl
      AUDIT_HASH_SALT: ${AUDIT_HASH_SALT:?AUDIT_HASH_SALT is required}
    volumes:
      - livekit-helper-data:/data

  livekit-agent-cpu:
    image: openmrs-livekit-agent-cpu:latest
    build:
      context: ${OPENMRS_LIVEKIT_AGENT_PATH:?OPENMRS_LIVEKIT_AGENT_PATH is required}
      dockerfile: ${OPENMRS_DISTRO_ROOT:?OPENMRS_DISTRO_ROOT is required}/deploy/livekit/agent-cpu.Dockerfile
    restart: unless-stopped
    depends_on:
      - livekit
      - livekit-helper
      - ollama
    environment:
      LIVEKIT_URL: ws://livekit:7880
      LIVEKIT_API_KEY: ${LIVEKIT_API_KEY:?LIVEKIT_API_KEY is required}
      LIVEKIT_API_SECRET: ${LIVEKIT_API_SECRET:?LIVEKIT_API_SECRET is required}
      LIVEKIT_ROOM_PREFIX: openmrs-voice-
      LLM_PROVIDER: ${LIVEKIT_AGENT_LLM_PROVIDER:-ollama}
      OLLAMA_BASE_URL: http://ollama:11434/v1
      OLLAMA_MODEL: ${OLLAMA_MODEL:-qwen2.5:1.5b}
      STT_PROVIDER: ${LIVEKIT_AGENT_STT_PROVIDER:-whisper}
      STT_LANGUAGE: en
      WHISPER_MODEL_SIZE: ${WHISPER_MODEL_SIZE:-base}
      WHISPER_COMPUTE_TYPE: int8
      WHISPER_BEAM_SIZE: '3'
      TTS_PROVIDER: ${LIVEKIT_AGENT_TTS_PROVIDER:-piper}
      TTS_LANGUAGE: en
      PIPER_BINARY: /srv/piper/piper/piper
      PIPER_MODEL_PATH_ES: /srv/piper/voices/es_MX-claude-high.onnx
      # Set this after adding an English Piper voice to the agent image or mounting one.
      PIPER_MODEL_PATH_EN: ${PIPER_MODEL_PATH_EN:-}
      TURN_DETECTION_MODE: vad
      FILLER_SOUND_ENABLED: 'false'
      ENABLE_OPENMRS_TOOLS: 'true'
      OPENMRS_BASE_URL: http://backend:8080/openmrs
      OPENMRS_USERNAME: ${OPENMRS_USERNAME:-admin}
      OPENMRS_PASSWORD: ${OPENMRS_PASSWORD:?OPENMRS_PASSWORD is required}
      ENABLE_TRANSCRIPT_SAVE: 'false'
      TRANSCRIPT_REDACTION_ENABLED: 'true'
      TRANSCRIPT_RAW_STORAGE_ALLOWED: 'false'
      API_PORT: '8000'
      LOG_LEVEL: INFO
      LOG_FORMAT: json

volumes:
  livekit-helper-data:
  ollama-data:
